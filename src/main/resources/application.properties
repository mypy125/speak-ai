# OpenAI API Configuration
openai.api.key=your-api-key-here
openai.api.model=gpt-3.5-turbo
openai.api.temperature=0.7
openai.api.max_tokens=1500

# Application Settings
app.name=SpeakAI
app.version=1.0.0
app.language=en
app.default.user=Demo

# Audio Settings
audio.sample.rate=44100
audio.sample.size=16
audio.channels=1
audio.max.recording.time=300 # 5 minutes in seconds

# Database Settings
database.url=jdbc:sqlite:data/speakai.db
database.create.tables=true

# UI Settings
ui.theme=light
ui.font.size=14
ui.language=ru

# Logging Settings
logging.level.root=INFO
logging.level.com.speakai=DEBUG
logging.file=logs/speakai.log