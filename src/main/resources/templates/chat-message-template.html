<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            color: #2c3e50;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }
        h1, h2, h3, h4 {
            margin: 8px 0 4px 0;
            font-weight: 600;
        }
        h1 { color: #2c3e50; font-size: 18px; }
        h2 { color: #34495e; font-size: 16px; border-bottom: 1px solid #e0e0e0; padding-bottom: 3px; }
        h3 { color: #2980b9; font-size: 15px; }
        p { margin: 5px 0; }
        ul, ol { margin: 5px 0; padding-left: 20px; }
        li { margin: 3px 0; }
        table { width: 100%; border-collapse: collapse; margin: 8px 0; }
        td { padding: 4px; border-bottom: 1px solid #ecf0f1; }

        /* Цветные блоки */
        .info-box {
            background-color: #e8f4f8;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #3498db;
        }
        .success-box {
            background-color: #e8f5e9;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #27ae60;
        }
        .warning-box {
            background-color: #fef9e7;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #f39c12;
        }
        .tip-box {
            background-color: #f3e5f5;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            border-left: 4px solid #8e44ad;
        }

        /* Бейджи и чипы */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin: 2px;
        }
        .badge-green { background-color: #27ae60; color: white; }
        .badge-blue { background-color: #3498db; color: white; }
        .badge-orange { background-color: #e67e22; color: white; }
        .badge-purple { background-color: #8e44ad; color: white; }

        /* Прогресс-бар */
        .progress-bar {
            background-color: #ecf0f1;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 5px 0;
        }
        .progress-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .progress-green { background-color: #27ae60; }
        .progress-blue { background-color: #3498db; }
        .progress-orange { background-color: #e67e22; }
        .progress-purple { background-color: #8e44ad; }

        /* Статистика */
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .stat-label { color: #7f8c8d; }
        .stat-value { font-weight: 600; }

        /* Ключевые слова */
        .word-chip {
            display: inline-block;
            background-color: #2ecc71;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin: 3px;
        }
        .phoneme-chip {
            display: inline-block;
            background-color: #e67e22;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-family: monospace;
            margin: 2px;
        }

        /* Таблицы */
        .stats-table {
            width: 100%;
            border-collapse: collapse;
        }
        .stats-table td {
            padding: 6px 4px;
        }

        /* Разделители */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #e0e0e0, transparent);
            margin: 15px 0;
        }

        /* Адаптивность */
        @media (max-width: 400px) {
            body { font-size: 12px; }
            .word-chip { font-size: 12px; padding: 3px 8px; }
        }
    </style>
</head>
<body>
{{CONTENT}}
</body>
</html>
